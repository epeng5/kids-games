const GRID_SIZE = 12;
const RAINBOW = ["#FF0000","#FF6600","#FFDD00","#00CC44","#0099FF","#8833FF","#FF33AA"];

function generateGrid(words) {
  const grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(""));
  const placed = [];
  const dirs = [[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  for (const word of words) {
    let ok = false, tries = 0;
    while (!ok && tries++ < 200) {
      const dir = dirs[Math.floor(Math.random() * dirs.length)];
      const row = Math.floor(Math.random() * GRID_SIZE);
      const col = Math.floor(Math.random() * GRID_SIZE);
      const er = row + dir[0] * (word.length - 1);
      const ec = col + dir[1] * (word.length - 1);
      if (er < 0 || er >= GRID_SIZE || ec < 0 || ec >= GRID_SIZE) continue;
      let can = true;
      for (let i = 0; i < word.length; i++) {
        const r = row + dir[0] * i, c = col + dir[1] * i;
        if (grid[r][c] !== "" && grid[r][c] !== word[i]) { can = false; break; }
      }
      if (!can) continue;
      for (let i = 0; i < word.length; i++) grid[row+dir[0]*i][col+dir[1]*i] = word[i];
      placed.push({ word, dir, cells: Array.from({length: word.length}, (_,i) => [row+dir[0]*i, col+dir[1]*i]) });
      ok = true;
    }
  }
  const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (!grid[r][c]) grid[r][c] = alpha[Math.floor(Math.random() * 26)];
  return { grid, placed };
}

// ── Critter that runs across the grid ─────────────────────────────────────────
// centerY: fraction 0-1 of grid height where the critter vertically centers
function CritterRun({ emoji, centerY, gridRect, onDone }) {
  const goRight = Math.random() > 0.5;
  const top = gridRect.top + gridRect.height * centerY - 28;
  const startX = goRight ? gridRect.left - 80 : gridRect.right + 10;
  const endX   = goRight ? gridRect.right + 10 : gridRect.left - 80;

  return (
    <div style={{
      position:"fixed", top, left:startX, zIndex:2000,
      fontSize:"3.2rem", lineHeight:1, pointerEvents:"none",
      transform: goRight ? "scaleX(1)" : "scaleX(-1)",
      animation:`critterRun 1.6s cubic-bezier(.4,0,.6,1) forwards`,
      "--ex": `${endX - startX}px`,
      filter:"drop-shadow(2px 4px 6px rgba(0,0,0,0.25))",
    }}>
      {emoji}
      <style>{`
        @keyframes critterRun {
          0%   { transform: scaleX(${goRight?1:-1}) translateX(0)      translateY(0)   rotate(0deg);   opacity:1; }
          20%  { transform: scaleX(${goRight?1:-1}) translateX(calc(var(--ex)*.2)) translateY(-18px) rotate(${goRight?-8:8}deg); }
          40%  { transform: scaleX(${goRight?1:-1}) translateX(calc(var(--ex)*.4)) translateY(4px)  rotate(0deg); }
          60%  { transform: scaleX(${goRight?1:-1}) translateX(calc(var(--ex)*.6)) translateY(-14px) rotate(${goRight?-6:6}deg); }
          80%  { transform: scaleX(${goRight?1:-1}) translateX(calc(var(--ex)*.8)) translateY(2px)  rotate(0deg); }
          90%  { opacity:1; }
          100% { transform: scaleX(${goRight?1:-1}) translateX(var(--ex))       translateY(0)   rotate(0deg);   opacity:0; }
        }
      `}</style>
    </div>
  );
}

// ── Main Puzzle ───────────────────────────────────────────────────────────────
function Puzzle({ themeKey, onBack }) {
  const theme = THEMES[themeKey];
  const [puzzleKey, setPuzzleKey] = useState(0);
  const [{ grid, placed }] = useState(() => generateGrid(theme.words));
  const [selecting, setSelecting] = useState(false);
  const [selected, setSelected] = useState([]);
  const [foundWords, setFoundWords] = useState([]);
  const [foundCells, setFoundCells] = useState({});
  const [celebrate, setCelebrate] = useState(false);
  const [particles, setParticles] = useState([]);
  const [critters, setCritters] = useState([]);
  const [gridRect, setGridRect] = useState(null);
  const [hintCells, setHintCells] = useState(new Set());
  const [hintCooldown, setHintCooldown] = useState(false);
  const gridRef = useRef(null);
  const getCellKey = (r, c) => `${r}-${c}`;

  // Measure grid position whenever layout settles
  const measureGrid = useCallback(() => {
    if (gridRef.current) setGridRect(gridRef.current.getBoundingClientRect());
  }, []);
  useEffect(() => {
    measureGrid();
    window.addEventListener("resize", measureGrid);
    return () => window.removeEventListener("resize", measureGrid);
  }, [measureGrid]);

  const startSelect = (r, c) => { setSelecting(true); setSelected([[r, c]]); };

  const continueSelect = (r, c) => {
    if (!selecting) return;
    const start = selected[0];
    if (!start) return;
    const dr = r - start[0], dc = c - start[1];
    if (!dr && !dc) { setSelected([start]); return; }
    let dirR = dr ? dr / Math.abs(dr) : 0;
    let dirC = dc ? dc / Math.abs(dc) : 0;
    if (dr && dc && Math.abs(dr) !== Math.abs(dc)) {
      if (Math.abs(dr) > Math.abs(dc)) dirC = 0; else dirR = 0;
    }
    const steps = (dirR && dirC) ? Math.min(Math.abs(dr),Math.abs(dc)) : dirR ? Math.abs(dr) : Math.abs(dc);
    setSelected(Array.from({length:steps+1},(_,i)=>[start[0]+dirR*i, start[1]+dirC*i]));
  };

  const spawnParticles = () => {
    const now = Date.now();
    const FLOWERS = ["🌸","🌺","🌼","🌷","🌹","🌻","💐","🪷"];
    const hearts = Array.from({length:16},(_,i)=>({
      id:`${now}-h-${i}`, kind:"heart", x:5+Math.random()*90,
      delay:Math.random()*.6, color:RAINBOW[i%RAINBOW.length],
      size:1.3+Math.random()*1.1, sway:(Math.random()-.5)*60,
    }));
    const flowers = Array.from({length:14},(_,i)=>({
      id:`${now}-f-${i}`, kind:"flower", x:3+Math.random()*94,
      delay:Math.random()*.8, emoji:FLOWERS[Math.floor(Math.random()*FLOWERS.length)],
      size:1.4+Math.random()*1.2, sway:(Math.random()-.5)*90,
      spin:(Math.random()-.5)*720,
    }));
    const p = [...hearts, ...flowers];
    setParticles(prev=>[...prev,...p]);
    setTimeout(()=>setParticles(prev=>prev.filter(x=>!p.find(q=>q.id===x.id))),3800);
  };

  const spawnCritter = (wordIdx, matchCells) => {
    if (!gridRef.current) return;
    const rect = gridRef.current.getBoundingClientRect();
    setGridRect(rect);
    const id = Date.now() + Math.random();
    const emoji = theme.emojis[wordIdx];
    const doesMove = theme.moves[wordIdx];

    if (doesMove) {
      const avgRow = matchCells.reduce((s,[r])=>s+r,0) / matchCells.length;
      const centerY = (avgRow + 0.5) / GRID_SIZE;
      setCritters(prev=>[...prev,{id, type:"run", emoji, centerY, rect}]);
    } else {
      // Find pixel center of the word
      const avgRow = matchCells.reduce((s,[r])=>s+r,0) / matchCells.length;
      const avgCol = matchCells.reduce((s,[,c])=>s+c,0) / matchCells.length;
      const cellW = rect.width / GRID_SIZE;
      const cellH = rect.height / GRID_SIZE;
      const centerX = rect.left + (avgCol + 0.5) * cellW;
      const centerY = rect.top  + (avgRow + 0.5) * cellH;
      setCritters(prev=>[...prev,{id, type:"spin", emoji, centerX, centerY}]);
    }
    setTimeout(()=>setCritters(prev=>prev.filter(c=>c.id!==id)), 1800);
  };

  const showHint = () => {
    if (hintCooldown) return;
    const remaining = placed.filter(p => !foundWords.includes(p.word));
    if (!remaining.length) return;
    const pick = remaining[Math.floor(Math.random() * remaining.length)];
    // Reveal just the first 2 letters as a hint
    const hintSet = new Set(pick.cells.slice(0, 2).map(([r,c]) => getCellKey(r,c)));
    setHintCells(hintSet);
    setHintCooldown(true);
    setTimeout(() => setHintCells(new Set()), 2500);
    setTimeout(() => setHintCooldown(false), 8000);
  };

  const endSelect = useCallback(() => {
    if (!selecting) return;
    setSelecting(false);
    const word = selected.map(([r,c])=>grid[r][c]).join("");
    const wordRev = word.split("").reverse().join("");
    const match = placed.find(p=>p.word===word||p.word===wordRev);
    if (match && !foundWords.includes(match.word)) {
      const wordIdx = theme.words.indexOf(match.word);
      const color = theme.found[wordIdx];
      const newFC = {...foundCells};
      match.cells.forEach(([r,c])=>{newFC[getCellKey(r,c)]=color;});
      setFoundCells(newFC);
      setFoundWords(prev=>{
        const next=[...prev,match.word];
        if (next.length===theme.words.length) setTimeout(()=>setCelebrate(true),300);
        return next;
      });
      spawnParticles();
      spawnCritter(wordIdx, match.cells);
    }
    setSelected([]);
  }, [selecting,selected,grid,placed,foundWords,foundCells,theme]);

  // Touch handlers
  useEffect(()=>{
    const el = gridRef.current;
    if (!el) return;
    const ts=(e)=>{ e.preventDefault(); const t=e.touches[0]; const tgt=document.elementFromPoint(t.clientX,t.clientY); if(tgt?.dataset?.r!=null)startSelect(+tgt.dataset.r,+tgt.dataset.c); };
    const tm=(e)=>{ e.preventDefault(); const t=e.touches[0]; const tgt=document.elementFromPoint(t.clientX,t.clientY); if(tgt?.dataset?.r!=null)continueSelect(+tgt.dataset.r,+tgt.dataset.c); };
    const te=(e)=>{ e.preventDefault(); endSelect(); };
    el.addEventListener("touchstart",ts,{passive:false});
    el.addEventListener("touchmove",tm,{passive:false});
    el.addEventListener("touchend",te,{passive:false});
    return()=>{ el.removeEventListener("touchstart",ts); el.removeEventListener("touchmove",tm); el.removeEventListener("touchend",te); };
  },[selecting,selected,endSelect]);

  const selKeys = new Set(selected.map(([r,c])=>getCellKey(r,c)));

  return (
    <>
    <div style={{
      minHeight:"100vh", background:theme.bg,
      fontFamily:"'Nunito','Comic Sans MS',cursive",
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"14px 10px 28px", position:"relative",
      userSelect:"none",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
        .cell{cursor:pointer;transition:transform .1s;}
        .cell:hover{transform:scale(1.1);}
        .heart{position:fixed;top:-8%;pointer-events:none;z-index:999;animation:hfall 3s ease-in forwards;}
        @keyframes hfall{0%{top:-8%;opacity:1;transform:rotate(0) translateX(0)}80%{opacity:1}100%{top:108%;opacity:0;transform:rotate(360deg) translateX(var(--sway))}}
        .flower{position:fixed;top:-8%;pointer-events:none;z-index:999;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));animation:ffall 3.6s ease-in forwards;}
        @keyframes ffall{0%{top:-8%;opacity:1;transform:rotate(0) translateX(0)}85%{opacity:1}100%{top:110%;opacity:0;transform:rotate(var(--spin)) translateX(var(--sway))}}
        .wchip{transition:all .3s;}
        .wfound{animation:wpop .5s cubic-bezier(.36,.07,.19,.97);}
        @keyframes wpop{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
        .pglow{animation:pglow 2s ease-in-out infinite alternate;}
        @keyframes pglow{from{text-shadow:0 0 10px ${theme.glowFrom},0 0 20px ${theme.glowFrom}}to{text-shadow:0 0 20px ${theme.glowTo},0 0 40px ${theme.glowTo}}}
        .celOverlay{position:fixed;inset:0;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:overlayIn .4s ease-out forwards;}
        @keyframes overlayIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
        .celTitle{animation:titleBounce 0.6s cubic-bezier(.36,.07,.19,.97) .2s both;}
        @keyframes titleBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0deg)}}
        .celEmoji{animation:emojiFloat 2s ease-in-out infinite;}
        @keyframes emojiFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-16px) rotate(5deg)}}
        .celBtn{cursor:pointer;border:none;font-family:inherit;transition:transform .2s,box-shadow .2s;}
        .celBtn:hover{transform:scale(1.07);box-shadow:0 8px 24px rgba(0,0,0,.2);}
        .confetti{position:fixed;pointer-events:none;z-index:2999;animation:confettiFall var(--dur) linear var(--delay) forwards;}
        @keyframes confettiFall{0%{top:-4%;opacity:1;transform:rotate(0deg) translateX(0)}100%{top:105%;opacity:.7;transform:rotate(var(--spin)) translateX(var(--sway))}}
        @keyframes hintPulse{from{transform:scale(1.15) brightness(1)}to{transform:scale(1.25) brightness(1.2)}}
        .hintbtn{cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
        .hintbtn:hover:not(:disabled){transform:scale(1.06);}
        .hintbtn:disabled{opacity:.45;cursor:not-allowed;}
      `}</style>

      {/* Rainbow heart + flower particles */}
      {particles.map(p=> p.kind === "flower" ? (
        <div key={p.id} className="flower" style={{left:`${p.x}%`,fontSize:`${p.size*22}px`,animationDelay:`${p.delay}s`,"--sway":`${p.sway}px`,"--spin":`${p.spin}deg`}}>
          {p.emoji}
        </div>
      ) : (
        <div key={p.id} className="heart" style={{left:`${p.x}%`,animationDelay:`${p.delay}s`,"--sway":`${p.sway}px`}}>
          <svg width={`${p.size*20}px`} height={`${p.size*20}px`} viewBox="0 0 24 24" fill={p.color} style={{filter:`drop-shadow(0 0 4px ${p.color}99)`}}>
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
      ))}

      {/* Critters running across grid */}
      {critters.map(c=> c.type === "run"
        ? <CritterRun key={c.id} emoji={c.emoji} centerY={c.centerY} gridRect={c.rect} onDone={()=>{}} />
        : <SpinEmoji  key={c.id} emoji={c.emoji} centerX={c.centerX} centerY={c.centerY} />
      )}

      {/* Top bar */}
      <div style={{width:"100%",maxWidth:720,display:"flex",alignItems:"center",marginBottom:10,gap:8}}>
        <button className="backbtn" onClick={onBack}>← Themes</button>
        <div style={{flex:1,textAlign:"center",fontSize:"1.5rem"}}>{theme.emoji}{theme.emoji2}</div>
        <div style={{width:80}}/>
      </div>

      <h1 className="pglow" style={{
        fontSize:"clamp(1.5rem,5vw,2.1rem)",margin:"0 0 2px",
        color:theme.accent,fontWeight:900,letterSpacing:1,textAlign:"center",
        textShadow:`2px 2px 0 ${theme.titleShadow}`
      }}>{theme.name}!</h1>
      <p style={{color:theme.accent,margin:"0 0 10px",fontSize:".88rem",fontWeight:800,opacity:.72,textAlign:"center"}}>
        {theme.label}
      </p>

      <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center",alignItems:"flex-start"}}>
        {/* Grid */}
        <div ref={gridRef} onMouseLeave={endSelect} onMouseUp={endSelect} style={{
          background:theme.cardBg,borderRadius:18,padding:10,
          boxShadow:`0 8px 32px ${theme.accent}22`,border:`3px solid ${theme.border}`,
          backdropFilter:"blur(8px)", position:"relative",
        }}>
          <table style={{borderCollapse:"collapse"}}>
            <tbody>
              {grid.map((row,r)=>(
                <tr key={r}>
                  {row.map((letter,c)=>{
                    const key=getCellKey(r,c);
                    const isHint = hintCells.has(key);
                    const isSel=selKeys.has(key);
                    const fc=foundCells[key];
                    return (
                      <td key={c} className="cell"
                        onMouseDown={()=>startSelect(r,c)}
                        onMouseEnter={()=>continueSelect(r,c)}
                        data-r={r} data-c={c}
                        style={{
                          width:"clamp(25px,4.8vw,34px)",height:"clamp(25px,4.8vw,34px)",
                          textAlign:"center",fontWeight:900,
                          fontSize:"clamp(.68rem,1.9vw,.9rem)",
                          color:isSel||fc?"#fff":isHint?"#fff":theme.accent,
                          background:isSel?theme.accent+"99":fc||( isHint?"#FFB800":"transparent"),
                          borderRadius:7,transition:"all .13s",
                          boxShadow:isSel?`0 2px 8px ${theme.accent}55`:fc?"0 2px 6px rgba(0,0,0,.15)":isHint?"0 0 10px #FFB80099":"none",
                          transform:isSel||isHint?"scale(1.15)":"scale(1)",
                          animation: isHint ? "hintPulse 0.6s ease-in-out infinite alternate" : "none",
                        }}>{letter}</td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Word list */}
        <div style={{
          background:theme.cardBg,borderRadius:18,padding:"12px 12px",
          boxShadow:`0 8px 32px ${theme.accent}22`,border:`3px solid ${theme.border}`,
          minWidth:136,
        }}>
          <div style={{fontWeight:900,color:theme.accent,marginBottom:7,fontSize:".9rem",textAlign:"center"}}>
            {theme.emoji} Find These
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {theme.words.map((word,i)=>{
              const isFound=foundWords.includes(word);
              return (
                <div key={word} className={`wchip ${isFound?"wfound":""}`} style={{
                  padding:"3px 9px",borderRadius:20,
                  background:isFound?theme.found[i]:theme.chipBg,
                  color:isFound?"#fff":theme.chipText,
                  fontWeight:800,fontSize:".78rem",
                  textDecoration:isFound?"line-through":"none",
                  border:`2px solid ${isFound?theme.found[i]:theme.chipBorder}`,
                  display:"flex",alignItems:"center",gap:5,
                }}>
                  <span style={{fontSize:"1rem"}}>{theme.emojis[i]}</span>
                  {isFound?"✅":""} {word}
                </div>
              );
            })}
          </div>
          <div style={{marginTop:8,textAlign:"center",color:theme.accent,fontWeight:700,fontSize:".75rem",opacity:.65}}>
            {foundWords.length} / {theme.words.length} found
          </div>
        </div>
      </div>

      <div style={{marginTop:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
        <button
          className="hintbtn"
          onClick={showHint}
          disabled={hintCooldown || foundWords.length === theme.words.length}
          style={{
            background: hintCooldown
              ? "rgba(180,180,180,0.3)"
              : `linear-gradient(135deg, #FFE234, #FFB800)`,
            border:`2px solid ${hintCooldown?"#ccc":"#FFA000"}`,
            borderRadius:50, padding:"10px 28px",
            fontWeight:900, fontSize:"1rem", color: hintCooldown?"#999":"#7A4800",
            boxShadow: hintCooldown?"none":"0 4px 16px #FFB80055",
            letterSpacing:.5,
          }}>
          {hintCooldown ? "⏳ Wait a moment..." : "💡 Give me a hint!"}
        </button>
        <div style={{color:theme.accent,fontSize:".7rem",fontWeight:700,opacity:.5}}>
          Drag to select • Any direction! ↕↔↗↙
        </div>
      </div>
    </div>

    {celebrate&&(
      <>
        {Array.from({length:60},(_,i)=>{
          const colors=["#FF0000","#FF6600","#FFDD00","#00CC44","#0099FF","#FF33AA","#B8A4FF","#FF9ED2"];
          const shapes=["●","■","▲","★","♥","◆"];
          return (
            <div key={i} className="confetti" style={{
              position:"fixed", zIndex:2999, pointerEvents:"none",
              left:`${Math.random()*100}%`,
              fontSize:`${.7+Math.random()*.8}rem`,
              color:colors[i%colors.length],
              "--dur":`${2+Math.random()*2}s`,
              "--delay":`${Math.random()*.8}s`,
              "--spin":`${(Math.random()-.5)*720}deg`,
              "--sway":`${(Math.random()-.5)*120}px`,
              animation:`confettiFall var(--dur) linear var(--delay) forwards`,
            }}>{shapes[i%shapes.length]}</div>
          );
        })}
        <div style={{
          position:"fixed",inset:0,zIndex:3000,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          background:`radial-gradient(ellipse at 50% 40%, ${theme.cardAccent}F2 0%, ${theme.border}DD 60%, ${theme.accent}88 100%)`,
          backdropFilter:"blur(8px)",
          fontFamily:"'Nunito','Comic Sans MS',cursive",
          animation:"overlayIn .4s ease-out forwards",
        }}>
          <style>{`
            @keyframes overlayIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
            @keyframes celBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
            @keyframes celFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-16px) rotate(5deg)}}
            @keyframes confettiFall{0%{top:-4%;opacity:1;transform:rotate(0deg) translateX(0)}100%{top:105%;opacity:.7;transform:rotate(var(--spin)) translateX(var(--sway))}}
            .celPlayBtn{cursor:pointer;border:none;font-family:inherit;transition:transform .2s,box-shadow .2s;}
            .celPlayBtn:hover{transform:scale(1.07);}
          `}</style>
          <div style={{fontSize:"6rem",marginBottom:8,animation:"celFloat 2s ease-in-out infinite"}}>{theme.emoji}</div>
          <div style={{
            fontSize:"clamp(2rem,8vw,3.5rem)",fontWeight:900,color:theme.accent,
            textShadow:`3px 3px 0 white, 0 0 30px ${theme.glowFrom}`,
            textAlign:"center",padding:"0 20px",lineHeight:1.2,
            animation:"celBounce .6s cubic-bezier(.36,.07,.19,.97) .2s both",
          }}>YOU DID IT! 🎉</div>
          <div style={{fontSize:"clamp(1rem,4vw,1.4rem)",fontWeight:800,color:theme.accent,opacity:.85,margin:"12px 0 6px",textAlign:"center"}}>
            {theme.celebrate}
          </div>
          <div style={{display:"flex",gap:8,margin:"10px 0 20px",fontSize:"2.2rem"}}>
            {theme.emojis.slice(0,5).map((e,i)=>(
              <span key={i} style={{display:"inline-block",animation:`celFloat ${1.5+i*.2}s ease-in-out ${i*.15}s infinite`}}>{e}</span>
            ))}
          </div>
          <div style={{background:"white",borderRadius:16,padding:"8px 20px",marginBottom:24,color:theme.accent,fontWeight:800,fontSize:"1rem",opacity:.85}}>
            All {theme.words.length} words found! 🌟
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
            <button className="celPlayBtn" onClick={()=>{setCelebrate(false);setFoundWords([]);setFoundCells({});setPuzzleKey(k=>k+1);}} style={{
              background:`linear-gradient(135deg,${theme.accent},${theme.glowTo})`,
              color:"white",borderRadius:50,padding:"14px 32px",fontWeight:900,fontSize:"1.1rem",
              boxShadow:`0 6px 20px ${theme.accent}66`,
            }}>🔄 Play Again</button>
            <button className="celPlayBtn" onClick={onBack} style={{
              background:"white",border:`3px solid ${theme.border}`,
              color:theme.accent,borderRadius:50,padding:"14px 32px",fontWeight:900,fontSize:"1.1rem",
            }}>🎨 New Theme</button>
          </div>
        </div>
      </>
    )}
    </>
  );
}

function App() {
  const [theme, setTheme] = useState(null);
  if (!theme) return <ThemePicker onSelect={setTheme} />;
  return <Puzzle key={theme} themeKey={theme} onBack={()=>setTheme(null)} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
