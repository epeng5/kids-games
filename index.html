<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    gap: 24px;
    padding: 20px;
  }
  h1 { color: white; font-size: 2rem; margin-bottom: 12px; }
  a {
    display: block;
    width: 280px;
    padding: 24px;
    background: white;
    border-radius: 16px;
    text-decoration: none;
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: #333;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    transition: transform 0.2s;
  }
  a:hover { transform: scale(1.05); }
</style>
</head>
<body>
  <h1>Pick Your Game</h1>
  <a href="chance/">🏎️ Chance's F1 Racing</a>
  <a href="sage/">🔍 Sage's Word Search</a>
</body>
</html>
