// ── TRACK ───────────────────────────────────────────────────────────────
const SEGS = [];
function addS(n,c){for(let i=0;i<n;i++)SEGS.push({curve:c,alt:Math.floor(SEGS.length/14)%2,drs:false});}
addS(80,0);addS(60,-2.1);addS(30,0);addS(65,2.7);addS(50,0);addS(75,-1.5);addS(35,0);addS(55,3.2);
addS(80,0);addS(50,-2.8);addS(28,0);addS(70,2.1);addS(55,0);addS(45,-3.8);addS(38,0);addS(60,3.6);addS(95,0);
while(SEGS.length<NSEGS)SEGS.push({curve:0,alt:Math.floor(SEGS.length/14)%2,drs:false});
SEGS.length=NSEGS;
for(let i=0;i<70;i++)SEGS[i].drs=true;
for(let i=620;i<700;i++)SEGS[i].drs=true;
const S_GATES=[0,400,800];

const curveTable=new Float32Array(SH);
function buildCurveTable(gz,gcam){
  let cx=0,psa=0;
  for(let y=SH-1;y>=HORIZON+1;y--){
    const ry=y-HORIZON,sa=DDIST/ry;
    cx+=SEGS[Math.floor(gz+sa)%NSEGS].curve*(sa-psa)*CF;psa=sa;
    curveTable[y]=cx;
  }
}

function fmtT(f){
  if(!f||f<=0)return "--.-";
  const s=f/60,m=Math.floor(s/60),sec=s%60;
  return m>0?`${m}:${sec.toFixed(3).padStart(6,"0")}`:`${sec.toFixed(3)}`;
}

// ── GAME STATE ──────────────────────────────────────────────────────────
function mkQuali(pTire,weather,session,activeNames){
  const boost=session===3?-80:session===2?-40:0;
  const all=AI_CFGS.filter(c=>!activeNames||activeNames.includes(c.name));
  return {
    z:0,x:0,speed:0,steer:0,cam:0,raceOn:false,fc:0,
    tire:pTire,tireWear:0,tireTemp:40,fuel:FUEL_START,damage:0,
    ers:ERS_MAX,ersD:false,drsOpen:false,drsAvail:false,
    qualiPhase:"outlap",lap:1,lapStart:0,lapsDone:0,
    pitPhase:"none",pitTimer:0,pitReq:false,nextTire:"soft",
    bestLap:0,lastLap:0,sector:0,sectorStart:0,sectorTimes:[0,0,0],
    weather,rainInt:weather==="wet"?0.65:0,trackWet:weather==="wet"?0.75:0,
    wPhase:weather==="wet"?1:0,wTimer:0,wDur:weather==="dry"?99999:0,
    drops:[],splashes:[],radioMsg:"",radioTimer:0,_session:session||1,
    ais:all.map((c,i)=>({...c,
      z:(i/all.length)*NSEGS*0.9,x:0,tx:0,lap:1,
      speed:c.base*0.72,tire:"soft",tireWear:0,tireTemp:45,
      bestLap:0,qLap:1,qLapStart:-(i*160),qPhase:"outlap",qLapsDone:0,
      _qBoost:boost,
    })),
  };
}

function mkRace(pTire,weather,grid){
  const total=grid.length;
  const pIdx=grid.findIndex(g=>g.isPlayer);
  const pZ=(total-1-pIdx)*0.65;
  return {
    z:pZ,x:pIdx%2===0?-0.28:0.28,speed:0,steer:0,cam:0,
    lap:1,finished:false,raceOn:false,lights:0,fc:0,
    tire:pTire,tireWear:0,tireTemp:40,fuel:FUEL_START,damage:0,
    ers:ERS_MAX,ersD:false,drsOpen:false,drsAvail:false,
    pitReq:false,nextTire:"medium",pitPhase:"none",pitTimer:0,pitCount:0,
    sector:0,sectorStart:0,sectorTimes:[0,0,0],lastLap:0,bestLap:0,lapStart:0,
    gapAhead:null,gapBehind:null,
    weather,rainInt:weather==="wet"?0.65:0,trackWet:weather==="wet"?0.75:0,
    wPhase:weather==="wet"?1:0,wTimer:0,wDur:weather==="dry"?99999:0,
    drops:[],splashes:[],radioMsg:"",radioTimer:0,
    flag:FLAG_NONE,flagTimer:0,gridPos:pIdx,
    ais:grid.filter(g=>!g.isPlayer).map(g=>{
      const gi=grid.findIndex(x=>x===g);
      return {...g,z:(total-1-gi)*0.65,x:gi%2===0?-0.28:0.28,tx:0,lap:1,
        finished:false,speed:g.base||0.85,tire:g.tire||"medium",
        tireWear:0,tireTemp:45,pitPhase:"none",pitTimer:0,hasPitted:false,fuel:FUEL_START};
    }),
  };
}

// ── WEATHER ─────────────────────────────────────────────────────────────
function tickWeather(gs){
  if(gs.weather==="dry")return;
  gs.wTimer+=4;
  if(gs.wTimer>gs.wDur){gs.wTimer=0;gs.wPhase=Math.min(gs.wPhase+1,4);gs.wDur=700+Math.random()*1100;}
  const phases=["dry","lightRain","heavyRain","lightRain","dry"];
  const tR=phases[gs.wPhase]==="dry"?0:phases[gs.wPhase]==="lightRain"?0.42:0.88;
  gs.rainInt+=(tR-gs.rainInt)*0.008;gs.trackWet+=(tR-gs.trackWet)*0.003;
  if(gs.rainInt>0.05&&gs.drops.length<MAX_DROPS){
    const add=Math.min(Math.floor(gs.rainInt*10),MAX_DROPS-gs.drops.length);
    for(let i=0;i<add;i++)gs.drops.push({x:Math.random()*SW,y:Math.random()*HORIZON,vx:gs.rainInt*1.8,vy:7+Math.random()*5});
  }
  for(let i=gs.drops.length-1;i>=0;i--){gs.drops[i].x+=gs.drops[i].vx;gs.drops[i].y+=gs.drops[i].vy;if(gs.drops[i].y>HORIZON+16)gs.drops.splice(i,1);}
  if(gs.trackWet>0.3&&gs.splashes.length<MAX_SPLASH&&Math.random()<gs.trackWet*0.25)
    gs.splashes.push({x:SW/2+(Math.random()-0.5)*72,y:SH-72-Math.random()*105,r:1,life:16});
  for(let i=gs.splashes.length-1;i>=0;i--){gs.splashes[i].r+=0.7;gs.splashes[i].life--;if(gs.splashes[i].life<=0)gs.splashes.splice(i,1);}
}

// ── DRAW FUNCTIONS ──────────────────────────────────────────────────────
function drawRoad(ctx,gz,gx,gcam,wet){
  const sk=ctx.createLinearGradient(0,0,0,HORIZON);
  sk.addColorStop(0,wet>0.3?"#080a16":"#04040d");
  sk.addColorStop(1,wet>0.3?"#0f1930":"#152038");
  ctx.fillStyle=sk;ctx.fillRect(0,0,SW,HORIZON);

  // Clouds or stars
  if(wet>0.1){for(let i=0;i<5;i++){ctx.fillStyle=`rgba(35,40,55,${Math.min(wet*0.9,0.82)})`;ctx.beginPath();ctx.ellipse(38+i*66,16+i*9,54+i*9,20,0,0,Math.PI*2);ctx.fill();}}
  else{for(let i=0;i<24;i++){ctx.fillStyle=`rgba(255,255,255,${0.18+(i%3)*0.16})`;ctx.fillRect((i*179+31)%SW,(i*107+17)%(HORIZON-10),1,1);}}

  // Grandstand structure (static — cheap)
  ctx.fillStyle="#1a1a2a";
  ctx.beginPath();ctx.moveTo(0,HORIZON);ctx.lineTo(0,HORIZON-52);ctx.lineTo(SW*0.38,HORIZON-52);ctx.lineTo(SW*0.42,HORIZON);ctx.closePath();ctx.fill();
  ctx.fillStyle="#222233";ctx.fillRect(0,HORIZON-58,SW*0.41,8);
  ctx.fillStyle="#e8002d";ctx.fillRect(0,HORIZON-58,SW*0.41,3);
  ctx.fillStyle="#1a1a2a";
  ctx.beginPath();ctx.moveTo(SW,HORIZON);ctx.lineTo(SW,HORIZON-48);ctx.lineTo(SW*0.62,HORIZON-48);ctx.lineTo(SW*0.58,HORIZON);ctx.closePath();ctx.fill();
  ctx.fillStyle="#222233";ctx.fillRect(SW*0.59,HORIZON-54,SW*0.41,8);
  ctx.fillStyle="#e8002d";ctx.fillRect(SW*0.59,HORIZON-54,SW*0.41,3);

  // Fans: draw as simple coloured pixel rows (no arc calls)
  const fanScroll=Math.floor(gz*0.18)%SW;
  const FC=["#ff4444","#4488ff","#ffdd00","#ffffff","#ff8800","#44ff88","#aa44ff","#ff44aa"];
  for(let row=0;row<4;row++){
    const ry2=HORIZON-14-row*11,rw=Math.floor(SW*0.38-row*8);
    for(let f=0;f<rw;f+=5){
      const fx=((f+fanScroll*(1+row*0.2))|0)%rw;
      if(fx<0||fx>=rw-4)continue;
      ctx.fillStyle=FC[(f/5*7+row*13)%FC.length|0];
      ctx.fillRect(fx,ry2,4,5);
      ctx.fillStyle="#c8956c";ctx.fillRect(fx+1,ry2-3,2,3);
    }
  }
  for(let row=0;row<3;row++){
    const sx=Math.floor(SW*0.60+row*4),rw=SW-sx-2;
    const ry2=HORIZON-14-row*10;
    for(let f=0;f<rw;f+=5){
      const fx=sx+(((f+fanScroll*(1.1+row*0.15))|0)%rw);
      if(fx<sx||fx>SW-6)continue;
      ctx.fillStyle=FC[(f/5*11+row*7+3)%FC.length|0];
      ctx.fillRect(fx,ry2,4,5);
      ctx.fillStyle="#c8956c";ctx.fillRect(fx+1,ry2-3,2,3);
    }
  }
  // Banners
  const bn=["HAMILTON","FERRARI","GO HAM!","44"];
  for(let b=0;b<3;b++){
    const bx=((b*120+(fanScroll*0.5)|0)%(SW*0.38|0))-10;
    if(bx>0&&bx<SW*0.34){
      ctx.fillStyle=b%2===0?"#e8002d":"#ffdd00";ctx.fillRect(bx,HORIZON-26,36,8);
      ctx.fillStyle="#fff";ctx.font="700 5px monospace";ctx.textAlign="center";
      ctx.fillText(bn[b%bn.length],bx+18,HORIZON-20);
    }
  }

  // Road
  for(let y=SH-1;y>=HORIZON+1;y--){
    const ry=y-HORIZON,rh=ROAD_HALF*ry/DPIX;
    const si=Math.floor(gz+DDIST/ry)%NSEGS,seg=SEGS[si];
    const cx=SW/2-gx*rh-curveTable[y]+gcam;
    ctx.fillStyle=seg.alt?(wet>0.2?"#13501a":"#195c19"):(wet>0.2?"#104415":"#165016");
    ctx.fillRect(0,y,SW,1);
    const rb=seg.alt?58:51,ws=wet*15;
    ctx.fillStyle=`rgb(${rb-ws},${rb-ws+wet*5},${rb-ws+wet*11})`;
    ctx.fillRect(cx-rh,y,rh*2,1);

    // Pit lane (only draw every 3 rows for performance)
    if(y%3===0){
      const inPitZone=si<65||si>NSEGS-65;
      if(inPitZone&&rh>20){
        const pitW=Math.max(2,rh*0.38),pitX=cx+rh+2;
        ctx.fillStyle=seg.alt?"#2e2e2e":"#282828";ctx.fillRect(pitX,y,pitW,3);
        if(rh>30){ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillRect(pitX,y,1.5,3);}
        if(rh>40&&si%6===0){
          const pitBoxColors=["#e8002d","#FF8000","#3671C6","#00D2BE","#358C75","#FF87BC","#64C4FF","#BB0000","#B6BABD","#1B3A6B"];
          ctx.fillStyle=pitBoxColors[Math.floor(si/6)%pitBoxColors.length];
          ctx.fillRect(pitX+pitW*0.1,y,pitW*0.8,2);
        }
      }
    }

    if(seg.drs&&rh>18){ctx.fillStyle="rgba(0,220,100,0.05)";ctx.fillRect(cx-rh+2,y,rh*2-4,1);}
    if(wet>0.2&&ry<DPIX*0.5){ctx.fillStyle=`rgba(85,125,200,${wet*0.13*(1-ry/DPIX)})`;ctx.fillRect(cx-rh*0.6,y,rh*1.2,1);}
    if(wet>0.5&&seg.alt&&rh>26){ctx.fillStyle=`rgba(65,110,190,${wet*0.18})`;ctx.fillRect(cx-rh*0.4,y,rh*0.35,1);ctx.fillRect(cx+rh*0.07,y,rh*0.26,1);}
    if(rh>8){
      const kw=Math.max(1,rh*0.1);
      ctx.fillStyle=Math.floor(si/3)%2===0?"#e8002d":"#fff";
      ctx.fillRect(cx-rh,y,kw,1);ctx.fillRect(cx+rh-kw,y,kw,1);
    }
    if(seg.alt&&rh>16){ctx.fillStyle=`rgba(255,255,150,${0.36*(1-wet*0.5)})`;ctx.fillRect(cx-1.5,y,3,1);}
    for(const g of S_GATES){if(Math.abs(si-g)<2){ctx.fillStyle="rgba(255,220,0,0.55)";ctx.fillRect(cx-rh,y,rh*2,1);}}
  }
}

function getCX(gz,gx,gcam,y){
  let cx=0,p=0;
  for(let yy=SH-1;yy>=y;yy--){
    const ry=yy-HORIZON;if(ry<=0)break;
    const sa=DDIST/ry;cx+=SEGS[Math.floor(gz+sa)%NSEGS].curve*(sa-p)*CF;p=sa;
  }
  return cx;
}

function drawAIs(ctx,gz,gx,gcam,wet,ais){
  for(const ai of ais){
    if(ai.pitPhase==="stopped")continue;
    const ah=ai.z-gz;
    if(ah<0.5||ah>DDIST*0.88)continue;
    const ry=DDIST/ah,ay=HORIZON+ry;
    if(ay>=SH-10||ay<=HORIZON+2)continue;
    const rh=ROAD_HALF*ry/DPIX;
    const row=Math.min(Math.max(Math.floor(ay),HORIZON+1),SH-1);
    const cx=SW/2-gx*rh-curveTable[row]+gcam;
    const sc=ry/DPIX,cw=Math.max(4,54*sc),ch=Math.max(3,30*sc);
    const ax=cx+ai.x*rh;
    if(wet>0.28&&sc>0.06){
      ctx.fillStyle=`rgba(125,160,215,${wet*0.18})`;
      ctx.fillRect(ax-cw*1.2,ay-ch*0.5,cw*2.4,ch*2.8);
    }
    ctx.fillStyle="rgba(0,0,0,0.25)";ctx.fillRect(ax-cw/2+2,ay-2,cw,4);
    ctx.fillStyle=ai.col;ctx.fillRect(ax-cw/2,ay-ch,cw,ch);
    ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(ax-cw*0.17,ay-ch*0.83,cw*0.34,ch*0.46);
    ctx.fillStyle=ai.col;ctx.fillRect(ax-cw*0.5,ay-ch-ch*0.1,cw,ch*0.09);
    if(sc>0.18){
      ctx.fillStyle="rgba(0,0,0,0.65)";ctx.fillRect(ax-cw*0.6,ay-ch-11,cw*1.2,8);
      ctx.fillStyle=ai.col;ctx.font=`700 ${Math.max(5,6*sc)}px monospace`;ctx.textAlign="center";
      ctx.fillText(ai.short,ax,ay-ch-4);
    }
  }
}

function drawRain(ctx,drops,ri){
  if(ri<0.05||!drops.length)return;
  ctx.strokeStyle=`rgba(155,190,255,${ri*0.45})`;ctx.lineWidth=0.9;
  ctx.beginPath();for(const d of drops){ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+d.vx*0.3,d.y+d.vy*0.3);}ctx.stroke();
}

function drawCockpit(ctx,steer,speed,wet,drsOpen,ersD){
  const ratio=Math.max(0,Math.min(speed/BASE_MAX,1));
  const rpmCol=ratio>0.9?"#ff0a0a":ratio>0.72?"#ff8800":"#00aaff";
  ctx.fillStyle="#080808";
  ctx.beginPath();ctx.moveTo(0,SH);ctx.lineTo(0,SH*0.55);ctx.lineTo(SW*0.14,SH*0.525);ctx.lineTo(SW*0.275,SH*0.59);ctx.lineTo(SW*0.275,SH);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(SW,SH);ctx.lineTo(SW,SH*0.55);ctx.lineTo(SW*0.86,SH*0.525);ctx.lineTo(SW*0.725,SH*0.59);ctx.lineTo(SW*0.725,SH);ctx.closePath();ctx.fill();

function F1Sim(){
  const [screen,setScreen]=useState("menu");
  const [startTire,setStartTire]=useState("soft");
  const [weather,setWeather]=useState("dry");
  const [hud,setHud]=useState({speed:0,lap:1,pos:1,tire:"soft",wear:0,wet:0,ersD:false,drsO:false,drsA:false,pitReq:false,pitPhase:"none",qualiPhase:"outlap",bestLap:0,flag:"none"});
  const [pitMenu,setPitMenu]=useState(false);
  const [results,setResults]=useState([]);
  const [qualiResults,setQualiResults]=useState(null);
  const [qualiSession,setQualiSession]=useState(1);
  const [qualiActiveAIs,setQualiActiveAIs]=useState(null);
  const [qualiGridBottom,setQualiGridBottom]=useState([]);
  const [qualiKnockoutData,setQualiKnockoutData]=useState(null);
  const [seasonMode,setSeasonMode]=useState(false);
  const [seasonRound,setSeasonRound]=useState(0);
  const [seasonStandings,setSeasonStandings]=useState(null);
  const [standingsTab,setStandingsTab]=useState("drivers");
  const [scale,setScale]=useState(1);

  const cvRef=useRef(null);
  const keysRef=useRef({});
  const btnRef=useRef({left:false,right:false,gas:false,brake:false,ers:false,drs:false});
  const gsRef=useRef(null);
  const rafRef=useRef(null);
  const finRef=useRef([]);
  const fCntRef=useRef(0);

  // Scale to fill screen
  useEffect(()=>{
    const upd=()=>setScale(Math.min(window.innerWidth/SW,window.innerHeight/SH));
    upd();
    window.addEventListener("resize",upd);
    return()=>window.removeEventListener("resize",upd);
  },[]);

  useEffect(()=>{
    const dn=e=>keysRef.current[e.key]=true;
    const up=e=>keysRef.current[e.key]=false;
    window.addEventListener("keydown",dn);window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up);};
  },[]);

  const radio=(gs,m)=>{gs.radioMsg=m;gs.radioTimer=220;};
  const confirmPit=tire=>{
    if(!gsRef.current)return;
    const gs=gsRef.current;
    if(gs.pitPhase!=="none"||gs.lap<2)return;
    gs.pitReq=true;gs.nextTire=tire;setPitMenu(false);radio(gs,"Box box box!");
  };

  const initStandings=()=>[
    {name:"HAMILTON", short:"HAM",col:"#e8002d",team:"Ferrari",     pts:0,isPlayer:true},
    {name:"NORRIS",   short:"NOR",col:"#FF8000",team:"McLaren",      pts:0},
    {name:"VERSTAPPEN",short:"VER",col:"#3671C6",team:"Red Bull",    pts:0},
    {name:"RUSSELL",  short:"RUS",col:"#00D2BE",team:"Mercedes",     pts:0},
    {name:"ALONSO",   short:"ALO",col:"#358C75",team:"Aston Martin", pts:0},
    {name:"LECLERC",  short:"LEC",col:"#cc0022",team:"Ferrari",      pts:0},
    {name:"PIASTRI",  short:"PIA",col:"#FF6600",team:"McLaren",      pts:0},
    {name:"ANTONELLI",short:"ANT",col:"#00B8A8",team:"Mercedes",     pts:0},
    {name:"HADJAR",   short:"HAD",col:"#2255AA",team:"Red Bull",     pts:0},
    {name:"BEARMAN",  short:"BEA",col:"#B6BABD",team:"Haas",         pts:0},
    {name:"GASLY",    short:"GAS",col:"#FF87BC",team:"Alpine",       pts:0},
    {name:"COLAPINTO",short:"COL",col:"#FF60A0",team:"Alpine",       pts:0},
    {name:"ALBON",    short:"ALB",col:"#64C4FF",team:"Williams",     pts:0},
    {name:"SAINZ",    short:"SAI",col:"#4488CC",team:"Williams",     pts:0},
    {name:"HULKENBERG",short:"HUL",col:"#BB0000",team:"Audi",        pts:0},
    {name:"BORTOLETO",short:"BOR",col:"#990000",team:"Audi",         pts:0},
    {name:"OCON",     short:"OCO",col:"#888888",team:"Haas",         pts:0},
    {name:"STROLL",   short:"STR",col:"#226655",team:"Aston Martin", pts:0},
    {name:"PEREZ",    short:"PER",col:"#1B3A6B",team:"Cadillac",     pts:0},
    {name:"BOTTAS",   short:"BOT",col:"#152E55",team:"Cadillac",     pts:0},
  ];

  const addPoints=(standings,raceRes)=>{
    const u=standings.map(d=>({...d}));
    raceRes.forEach((r,i)=>{const pts=POINTS_TABLE[i]||0;const f=u.find(d=>d.name===r.name);if(f)f.pts+=pts;});
    return u.sort((a,b)=>b.pts-a.pts);
  };

  const getTeamStandings=(ds)=>{
    const TCOLS={"Ferrari":"#e8002d","McLaren":"#FF8000","Red Bull":"#3671C6","Mercedes":"#00D2BE","Aston Martin":"#358C75","Alpine":"#FF87BC","Williams":"#64C4FF","Audi":"#BB0000","Haas":"#B6BABD","Cadillac":"#1B3A6B"};
    const t={};
    ds.forEach(d=>{
      if(!t[d.team])t[d.team]={team:d.team,pts:0,col:TCOLS[d.team]||"#888",hasPlayer:false};
      t[d.team].pts+=d.pts;if(d.isPlayer)t[d.team].hasPlayer=true;
    });
    return Object.values(t).sort((a,b)=>b.pts-a.pts);
  };

  const SESSION_ELIM={1:5,2:5,3:0};

  const finishQualiSession=(session,pBest,aiTimes)=>{
    const all=[{name:"HAMILTON",short:"HAM",col:"#e8002d",team:"Ferrari",isPlayer:true,time:pBest||99999,qualiTime:pBest||99999,base:1.015,tire:startTire},...aiTimes].sort((a,b)=>a.time-b.time);
    const elim=SESSION_ELIM[session]||0;
    const surviving=all.slice(0,all.length-elim);
    const knocked=all.slice(all.length-elim);
    const playerKnocked=knocked.some(d=>d.isPlayer);
    const startPos=session===1?16:11;
    const newBottom=[...qualiGridBottom,...knocked.map((d,i)=>({...d,gridPos:startPos+i}))];
    if(session===3||playerKnocked){
      const fullGrid=[...surviving,...newBottom].sort((a,b)=>(a.time||99999)-(b.time||99999));
      setQualiKnockoutData({session,allTimes:all,knocked,surviving,playerKnocked,isFinal:true,fullGrid});
      setQualiGridBottom(newBottom);
    } else {
      setQualiGridBottom(newBottom);
      setQualiKnockoutData({session,allTimes:all,knocked,surviving,playerKnocked,isFinal:false});
      setQualiActiveAIs(surviving.filter(d=>!d.isPlayer).map(d=>d.name));
    }
    setScreen("qualiKnockout");
  };

  const launchQuali=(session,activeAIs,w)=>{
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    gsRef.current=mkQuali(startTire,w||weather,session,activeAIs);
    setScreen("quali");
    setTimeout(()=>{
      if(!gsRef.current)return;
      gsRef.current.raceOn=true;gsRef.current.lapStart=gsRef.current.fc;
      const lbls={1:"Q1 — GET INTO TOP 15!",2:"Q2 — GET INTO TOP 10!",3:"Q3 — FIGHT FOR POLE!"};
      radio(gsRef.current,lbls[session]||"Qualify!");
    },800);
  };

  const startQuali=()=>{
    setQualiSession(1);setQualiActiveAIs(null);setQualiGridBottom([]);setQualiKnockoutData(null);
    launchQuali(1,null,weather);
  };

  const startSeasonQuali=()=>{
    if(!seasonStandings)setSeasonStandings(initStandings());
    setQualiSession(1);setQualiActiveAIs(null);setQualiGridBottom([]);setQualiKnockoutData(null);
    launchQuali(1,null,"dry");
  };

  const startRace=(grid)=>{
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    gsRef.current=mkRace(startTire,seasonMode?"dry":weather,grid);
    finRef.current=[];fCntRef.current=0;
    setResults([]);setPitMenu(false);setScreen("race");
    let l=0;
    const tick=()=>{if(!gsRef.current)return;l++;gsRef.current.lights=l;if(l<5)setTimeout(tick,700);else setTimeout(()=>{if(gsRef.current){gsRef.current.lights=6;gsRef.current.raceOn=true;gsRef.current.lapStart=gsRef.current.fc;}},700+Math.random()*1400);};
    setTimeout(tick,800);
  };

  // ── QUALIFYING LOOP ────────────────────────────────────────────────────
  useEffect(()=>{
    if(screen!=="quali")return;
    const canvas=cvRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    let alive=true;

    const loop=()=>{
      if(!alive)return;
      const gs=gsRef.current;
      const k=keysRef.current,b=btnRef.current;
      gs.fc++;

      if(gs.fc%4===0)tickWeather(gs);

      if(gs.raceOn&&gs.qualiPhase!=="done"){
        const td=TIRES[gs.tire];
        const wR=Math.min(gs.tireWear/td.maxWear,1),tG=Math.min(gs.tireTemp/td.optT,1);
        const isWet=gs.trackWet>0.22,wetP=isWet&&td.dryG>0.9?1-gs.trackWet*0.48:1;
        const effMax=BASE_MAX*(isWet?td.wetG:td.dryG)*tG*(1-wR*0.3)*wetP;

        if(gs.pitPhase==="stopped"){
          // Stopped in pits — wait for tire change
          gs.pitTimer++;
          gs.x+=(1.35-gs.x)*0.15;
          if(gs.pitTimer>=PIT_DUR){
            gs.tire=gs.nextTire; gs.tireWear=0; gs.tireTemp=40;
            gs.pitPhase="none"; gs.pitReq=false; gs.speed=0.08; gs.x=0;
            // Reset to outlap after pit
            gs.qualiPhase="outlap";
            radio(gs,"New tires on! Get out there and set a lap!");
          }
        } else {
        const gas=k["ArrowUp"]||b.gas,brake=k["ArrowDown"]||b.brake;
        const left=k["ArrowLeft"]||b.left,right=k["ArrowRight"]||b.right;
        const ersKey=k[" "]||k["e"]||k["E"]||b.ers;
        const drsKey=k["d"]||k["D"]||b.drs;
        gs.ersD=ersKey&&gs.ers>0;
        if(gs.ersD)gs.ers=Math.max(0,gs.ers-ERS_DEPLOY);
        else if(brake&&gs.speed>0.3)gs.ers=Math.min(ERS_MAX,gs.ers+ERS_HARVEST);
        const top=effMax+(gs.ersD?0.08:0)+(gs.drsOpen?DRS_GAIN:0);
        if(gas)gs.speed=Math.min(gs.speed+0.011,top);
        else gs.speed=Math.max(gs.speed-0.006,0);
        if(brake)gs.speed=Math.max(gs.speed-0.028,0);
        if(Math.abs(gs.x)>0.88)gs.speed*=0.92;
        const grip=0.12*Math.max(0.35,1-gs.speed/BASE_MAX*0.35);
        if(left){gs.x=Math.max(gs.x-grip,-0.95);gs.steer=Math.max(gs.steer-2.2,-28);}
        if(right){gs.x=Math.min(gs.x+grip,0.95);gs.steer=Math.min(gs.steer+2.2,28);}
        if(!left&&!right)gs.steer*=0.72;
        gs.z+=gs.speed;gs.cam+=SEGS[Math.floor(gs.z)%NSEGS].curve*gs.speed*CF*0.6;gs.cam*=0.962;
        gs.tireWear+=gs.speed*0.86*(1+Math.abs(gs.steer)*0.014);
        gs.tireTemp=Math.max(30,Math.min(130,gs.tireTemp+(gas?TIRES[gs.tire].hR*gs.speed*0.9:0)-(gs.tireTemp>35?0.04:0)));
        const curSeg=Math.floor(gs.z)%NSEGS;
        gs.drsAvail=SEGS[curSeg].drs;
        if(drsKey&&gs.drsAvail)gs.drsOpen=true;
        if(!SEGS[curSeg].drs)gs.drsOpen=false;

        // Pit entry during qualifying
        if(gs.pitReq&&gs.pitPhase==="none"){
          if(curSeg>NSEGS-30||curSeg<22){gs.pitPhase="stopped";gs.pitTimer=0;}
        }

        if(gs.fc%3===0&&gs.qualiPhase==="flying"){
          for(let sg=0;sg<3;sg++){
            const gate=S_GATES[sg],next=S_GATES[(sg+1)%3];
            if(gs.sector===sg&&curSeg>gate+30&&Math.abs(curSeg-next)<5){gs.sectorTimes[sg]=gs.fc-gs.sectorStart;gs.sectorStart=gs.fc;gs.sector=(sg+1)%3;}
          }
        }
        if(gs.z>=gs.lap*NSEGS){
          const lt=gs.fc-gs.lapStart;
          if(gs.qualiPhase==="flying"){
            gs.lastLap=lt;
            if(gs.bestLap===0||lt<gs.bestLap){gs.bestLap=lt;radio(gs,lt<1400?"PURPLE LAP! Mega!":"Good lap!");}
            else radio(gs,"Lap done. Push harder!");
            gs.lapsDone++;gs.sectorTimes=[0,0,0];gs.sector=0;
          }
          gs.lapStart=gs.fc;gs.lap++;
          if(gs.lapsDone>=QUALI_LAPS){gs.qualiPhase="done";radio(gs,"Chequered flag! Session over.");}
          else{
            gs.qualiPhase=gs.qualiPhase==="outlap"?"flying":gs.qualiPhase==="flying"?"cooldown":"flying";
            if(gs.qualiPhase==="flying")radio(gs,"Push now! Flying lap!");
            if(gs.qualiPhase==="cooldown")radio(gs,"Good lap. Cool down lap.");
          }
          gs.sectorStart=gs.fc;
        }
        } // end else (not stopped)
      }

      // AI qualifying
      if(gs.raceOn){
        for(const ai of gs.ais){
          if(!ai.qLap)ai.qLap=1;if(!ai.qLapStart)ai.qLapStart=gs.fc+(ai.qLapStart||0);if(!ai.qPhase)ai.qPhase="outlap";
          const targetSpd=ai.qPhase==="flying"?ai.base*(0.992+Math.random()*0.015):ai.base*0.72;
          ai.speed=ai.speed*0.92+targetSpd*0.08;
          ai.z+=ai.speed;
          if(gs.fc%12===0){ai.tx=(Math.random()-0.5)*0.4;}
          ai.x+=(ai.tx-ai.x)*0.04;
          if(ai.z>=ai.qLap*NSEGS){
            const lt=gs.fc-ai.qLapStart;
            if(ai.qPhase==="flying"){
              const boost=ai._qBoost||0;
              const est=ai.qualiBase+boost+(Math.random()-0.5)*12;
              const finalT=lt>1000&&lt<2500?lt:est;
              if(ai.bestLap===0||finalT<ai.bestLap)ai.bestLap=finalT;
              ai.qLapsDone=(ai.qLapsDone||0)+1;
            }
            ai.qLapStart=gs.fc;ai.qLap++;
            ai.qPhase=ai.qPhase==="outlap"?"flying":ai.qPhase==="flying"?"cooldown":"flying";
          }
        }
      }

      if(gs.radioTimer>0)gs.radioTimer--;
      if(gs.fc%4===0)setHud(h=>({...h,speed:(gs.speed/BASE_MAX*KMH)|0,qualiPhase:gs.qualiPhase,bestLap:gs.bestLap,tire:gs.tire,ersD:gs.ersD,drsO:gs.drsOpen,drsA:gs.drsAvail,pitPhase:gs.pitPhase,pitReq:gs.pitReq}));

      if(gs.pitPhase==="stopped"){
        ctx.fillStyle="#111";ctx.fillRect(0,0,SW,SH);
        drawPit(ctx,gs.pitTimer,gs.nextTire||"soft");
      } else {
        buildCurveTable(gs.z,gs.cam);
        ctx.clearRect(0,0,SW,SH);
        drawRoad(ctx,gs.z,gs.x,gs.cam,gs.trackWet);
        drawAIs(ctx,gs.z,gs.x,gs.cam,gs.trackWet,gs.ais);
        drawRain(ctx,gs.drops,gs.rainInt);
        if(gs.splashes.length){ctx.strokeStyle="rgba(120,165,255,0.5)";ctx.lineWidth=0.7;for(const s of gs.splashes){ctx.globalAlpha=s.life/16*0.55;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;}
        drawCockpit(ctx,gs.steer,gs.speed,gs.trackWet,gs.drsOpen,gs.ersD);
        drawQualiHUD(ctx,gs);
        if(gs.pitReq&&gs.pitPhase==="none"){
          ctx.fillStyle="rgba(0,0,0,0.82)";ctx.fillRect(SW/2-106,HORIZON+9,212,34);
          ctx.fillStyle="#ff8800";ctx.font="900 11px monospace";ctx.textAlign="center";ctx.fillText("🔧 PITTING NEXT LAP",SW/2,HORIZON+23);
          ctx.fillStyle=TIRES[gs.nextTire||"soft"].col;ctx.font="700 8px monospace";ctx.fillText(`→ ${TIRES[gs.nextTire||"soft"].name}`,SW/2,HORIZON+34);
        }
      }

      if(gs.qualiPhase==="done"&&alive){
        const sl={1:"Q1",2:"Q2",3:"Q3"}[gs._session||1]||"Q";
        ctx.fillStyle="rgba(0,0,0,0.88)";ctx.fillRect(SW/2-120,SH/2-50,240,110);
        ctx.strokeStyle="#ffdd00";ctx.lineWidth=2;ctx.strokeRect(SW/2-120,SH/2-50,240,110);
        ctx.fillStyle="#ffdd00";ctx.font="900 14px monospace";ctx.textAlign="center";ctx.fillText(`${sl} COMPLETE`,SW/2,SH/2-28);
        ctx.fillStyle="#fff";ctx.font="900 20px monospace";ctx.fillText(fmtT(gs.bestLap),SW/2,SH/2+2);
        ctx.fillStyle="#888";ctx.font="700 9px monospace";ctx.fillText(gs.bestLap>0?"TAP TO SEE RESULTS":"NO TIME — ELIMINATED",SW/2,SH/2+24);
        if(!gs._gridBuilt){
          gs._gridBuilt=true;
          const sessionBoost=gs._session===1?0:gs._session===2?-40:-80;
          const aiTimes=gs.ais.map(a=>({name:a.name,short:a.short,col:a.col,team:a.team,isPlayer:false,
            time:a.bestLap>0?a.bestLap:a.qualiBase+sessionBoost+(Math.random()-0.5)*12,
            qualiTime:a.bestLap>0?a.bestLap:a.qualiBase+sessionBoost+(Math.random()-0.5)*12,
            startZ:a.startZ,base:a.base,tire:a.tire,
          }));
          setTimeout(()=>{if(!alive)return;finishQualiSession(gs._session||1,gs.bestLap,aiTimes);},600);
        }
      }

      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>{alive=false;cancelAnimationFrame(rafRef.current);};
  },[screen]);

  // ── RACE LOOP ──────────────────────────────────────────────────────────
  useEffect(()=>{
    if(screen!=="race")return;
    const canvas=cvRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    let alive=true;

    const loop=()=>{
      if(!alive)return;
      const gs=gsRef.current;
      const k=keysRef.current,b=btnRef.current;
      gs.fc++;

      if(gs.raceOn&&gs.weather!=="dry"&&gs.fc%4===0){
        tickWeather(gs);
        for(const ai of gs.ais)if(!ai.hasPitted&&!ai.finished&&ai.pitPhase==="none"&&gs.trackWet>0.52&&!["inter","wet"].includes(ai.tire)&&Math.random()<0.003){ai.pitPhase="stopped";ai.pitTimer=0;}
      }

      if(gs.raceOn&&!gs.finished){
        // Flag tick
        if(gs.flag!==FLAG_NONE){
          gs.flagTimer++;
          if(gs.flag===FLAG_YELLOW&&gs.flagTimer>YELLOW_DUR){gs.flag=FLAG_NONE;gs.flagTimer=0;radio(gs,"Green flag! Go go go!");}
          if(gs.flag===FLAG_RED&&gs.flagTimer>RED_DUR){gs.flag=FLAG_NONE;gs.flagTimer=0;radio(gs,"Red flag cleared! Race resumes!");}
        }
        // Random incidents
        if(gs.flag===FLAG_NONE&&gs.lap>1&&gs.fc%6===0&&Math.random()<0.00420){
          const isRed=Math.random()<0.60;
          gs.flag=isRed?FLAG_RED:FLAG_YELLOW;gs.flagTimer=0;
          const v=["NORRIS","VERSTAPPEN","ALONSO","SAINZ","PEREZ","STROLL","OCON","BOTTAS"];
          const who=v[Math.floor(Math.random()*v.length)];
          radio(gs,isRed?`RED FLAG! ${who} has crashed!`:`Yellow! ${who} has gone off.`);
        }

        const td=TIRES[gs.tire];
        const wR=Math.min(gs.tireWear/td.maxWear,1);
        const tG=Math.min(gs.tireTemp/td.optT,1)*(gs.tireTemp/td.optT>1?1/(1+(gs.tireTemp/td.optT-1)*1.4):1);
        const isWet=gs.trackWet>0.22;
        const wetP=isWet&&td.dryG>0.9?1-gs.trackWet*0.48:1;
        const fM=1-(gs.fuel/FUEL_START)*0.010,dM=1-gs.damage*0.003;
        const effMax=BASE_MAX*(isWet?td.wetG:td.dryG)*tG*(1-wR*0.15)*wetP*fM*dM;

        if(gs.pitPhase==="stopped"){
          gs.pitTimer++;
          // Visually park in pit lane (shift x right)
          gs.x += (1.35 - gs.x) * 0.15;
          if(gs.pitTimer>=PIT_DUR){gs.tire=gs.nextTire;gs.tireWear=0;gs.tireTemp=40;gs.pitPhase="none";gs.pitReq=false;gs.pitCount++;gs.speed=0.08;gs.x=0.0;radio(gs,"Brilliant stop! Go go go!");}
        } else {
          const gas=k["ArrowUp"]||b.gas,brake=k["ArrowDown"]||b.brake;
          const left=k["ArrowLeft"]||b.left,right=k["ArrowRight"]||b.right;
          const ersKey=k[" "]||k["e"]||k["E"]||b.ers;
          const drsKey=k["d"]||k["D"]||b.drs;
          gs.ersD=ersKey&&gs.ers>0;
          if(gs.ersD)gs.ers=Math.max(0,gs.ers-ERS_DEPLOY);
          else if(brake&&gs.speed>0.3)gs.ers=Math.min(ERS_MAX,gs.ers+ERS_HARVEST);
          const top=effMax+(gs.ersD?0.08:0)+(gs.drsOpen?DRS_GAIN:0);
          if(gas)gs.speed=Math.min(gs.speed+0.021,top);
          else gs.speed=Math.max(gs.speed-0.006,0);
          if(brake)gs.speed=Math.max(gs.speed-0.028,0);
          if(Math.abs(gs.x)>0.88){gs.speed*=0.95;gs.damage=Math.min(100,gs.damage+0.02);}
          if(gs.flag===FLAG_YELLOW)gs.speed=Math.min(gs.speed,0.38);
          if(gs.flag===FLAG_RED)gs.speed=Math.min(gs.speed,0.18);
          const wetSlip=isWet&&td.dryG>0.9?gs.trackWet*0.013:0;
          const grip=0.12*Math.max(0.35,1-gs.speed/BASE_MAX*0.35)-wetSlip;
          if(left){gs.x=Math.max(gs.x-grip,-0.95);gs.steer=Math.max(gs.steer-2.2,-28);}
          if(right){gs.x=Math.min(gs.x+grip,0.95);gs.steer=Math.min(gs.steer+2.2,28);}
          if(!left&&!right)gs.steer*=0.72;
          gs.z+=gs.speed;gs.cam+=SEGS[Math.floor(gs.z)%NSEGS].curve*gs.speed*CF*0.6;gs.cam*=0.962;
          gs.fuel=Math.max(0,gs.fuel-FUEL_RATE*gs.speed*60);
          gs.tireWear+=gs.speed*(isWet?0.36:0.55)*(1+Math.abs(gs.steer)*0.014);
          gs.tireTemp=Math.max(30,Math.min(130,gs.tireTemp+(gas?td.hR*gs.speed*0.9:0)-(gs.tireTemp>35?0.04:0)));
          const curSeg=Math.floor(gs.z)%NSEGS;
          const bestAI=gs.ais.filter(a=>!a.finished&&a.z>gs.z).sort((a,b)=>a.z-b.z)[0];
          gs.drsAvail=SEGS[curSeg].drs&&bestAI&&(bestAI.z-gs.z)*0.08<1.0;
          if(drsKey&&gs.drsAvail)gs.drsOpen=true;
          if(!SEGS[curSeg].drs||!gs.drsAvail)gs.drsOpen=false;
          if(gs.fc%6===0){
            const all2=[{z:gs.z+(gs.lap-1)*NSEGS,p:true},...gs.ais.map(a=>({z:a.z+(a.lap-1)*NSEGS,p:false}))];
            all2.sort((a,b)=>b.z-a.z);const pi=all2.findIndex(c=>c.p);
            gs.gapAhead=pi>0?+((all2[pi-1].z-all2[pi].z)*0.085).toFixed(2):null;
            gs.gapBehind=pi<all2.length-1?+((all2[pi].z-all2[pi+1].z)*0.085).toFixed(2):null;
          }
          if(gs.pitReq&&gs.pitPhase==="none"){
            const s=curSeg;
            if(s>NSEGS-30||s<22){gs.pitPhase="stopped";gs.pitTimer=0;}
          }
          if(gs.fc%3===0){for(let sg=0;sg<3;sg++){const gate=S_GATES[sg],next=S_GATES[(sg+1)%3];if(gs.sector===sg&&curSeg>gate+30&&Math.abs(curSeg-next)<5){gs.sectorTimes[sg]=gs.fc-gs.sectorStart;gs.sectorStart=gs.fc;gs.sector=(sg+1)%3;}}}
          if(gs.z>=gs.lap*NSEGS){
            const lt=gs.fc-gs.lapStart;gs.lastLap=lt;if(gs.bestLap===0||lt<gs.bestLap)gs.bestLap=lt;
            gs.lapStart=gs.fc;gs.sector=0;gs.sectorTimes=[0,0,0];gs.sectorStart=gs.fc;gs.ers=Math.min(ERS_MAX,gs.ers+700);
            if(gs.lap>=MAX_LAPS){
              gs.finished=true;fCntRef.current++;finRef.current.push({name:"HAMILTON",team:"Ferrari",col:"#e8002d",isPlayer:true,pits:gs.pitCount,best:fmtT(gs.bestLap)});
            } else {gs.lap++;radio(gs,RADIO_MSGS[Math.floor(Math.random()*RADIO_MSGS.length)]);}
          }
        }
      }

      // AI race
      if(gs.raceOn){
        for(const ai of gs.ais){
          if(ai.finished)continue;
          if(ai.pitPhase==="stopped"){ai.pitTimer++;if(ai.pitTimer>=PIT_DUR+Math.random()*40){ai.tire=gs.trackWet>0.5?"inter":"hard";ai.tireWear=0;ai.tireTemp=42;ai.pitPhase="none";ai.hasPitted=true;}continue;}
          const atd=TIRES[ai.tire];const wp=Math.min(ai.tireWear/atd.maxWear,0.94);
          const isWet=gs.trackWet>0.22,wetP=isWet&&atd.dryG>0.9?1-gs.trackWet*0.45:1;
          let spd=ai.base*(isWet?atd.wetG:atd.dryG)*(1-wp*0.22)*wetP*(0.992+Math.random()*0.015);
          if(gs.flag===FLAG_YELLOW)spd=Math.min(spd,0.36);
          if(gs.flag===FLAG_RED)spd=Math.min(spd,0.16);
          ai.z+=spd;ai.tireWear+=spd*0.70;ai.tireTemp=Math.min(120,ai.tireTemp+spd*0.4);

          if(!ai.hasPitted&&ai.lap>=2&&ai.tireWear/atd.maxWear>0.65&&Math.random()<0.003){ai.pitPhase="stopped";ai.pitTimer=0;}
          if(ai.z>=ai.lap*NSEGS){if(ai.lap>=MAX_LAPS){ai.finished=true;fCntRef.current++;finRef.current.push({name:ai.name,team:ai.team,col:ai.col,isPlayer:false,pits:ai.hasPitted?1:0,best:"--"});}else ai.lap++;}
        }
      }

      if(gs.radioTimer>0)gs.radioTimer--;
      if(gs.fc%4===0){
        const all3=[{z:(gs.lap-1)*NSEGS+gs.z%NSEGS,p:true},...gs.ais.map(a=>({z:(a.lap-1)*NSEGS+a.z%NSEGS,p:false}))];

        setHud(h=>({...h,speed:(gs.speed/BASE_MAX*KMH)|0,lap:Math.min(gs.lap,MAX_LAPS),pos:all3.findIndex(d=>d.p)+1,

          wet:(gs.trackWet*100)|0,ersD:gs.ersD,drsO:gs.drsOpen,drsA:gs.drsAvail,

      }

      if(gs.pitPhase==="stopped"){
        ctx.fillStyle="#111";ctx.fillRect(0,0,SW,SH);
        drawPit(ctx,gs.pitTimer,gs.nextTire);
      } else {
        buildCurveTable(gs.z,gs.cam);
        ctx.clearRect(0,0,SW,SH);
        drawRoad(ctx,gs.z,gs.x,gs.cam,gs.trackWet);
        drawAIs(ctx,gs.z,gs.x,gs.cam,gs.trackWet,gs.ais);

        if(gs.splashes.length){ctx.strokeStyle="rgba(120,165,255,0.5)";ctx.lineWidth=0.7;for(const s of gs.splashes){ctx.globalAlpha=s.life/16*0.55;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;}

        drawRaceHUD(ctx,gs);

        }
        if(gs.pitReq&&gs.pitPhase==="none"){
          ctx.fillStyle="rgba(0,0,0,0.8)";ctx.fillRect(SW/2-106,HORIZON+9,212,34);
          ctx.fillStyle="#ff8800";ctx.font="900 11px monospace";ctx.textAlign="center";ctx.fillText("🔧 BOX THIS LAP",SW/2,HORIZON+23);
          ctx.fillStyle=TIRES[gs.nextTire].col;ctx.font="700 8px monospace";ctx.fillText(`→ ${TIRES[gs.nextTire].name}`,SW/2,HORIZON+34);
        }
      }

      if(gs.finished&&alive){
        setTimeout(()=>{
          if(!alive)return;
          const rem=gs.ais.filter(a=>!a.finished).sort((a,b)=>b.z-a.z);
          const fin=[...finRef.current];
          for(const ai of rem)fin.push({name:ai.name,team:ai.team,col:ai.col,isPlayer:false,pits:ai.hasPitted?1:0,best:"--"});
          setResults(fin);setScreen("finish");alive=false;
        },1600);
      }

      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>{alive=false;cancelAnimationFrame(rafRef.current);};
  },[screen]);

  // ── STYLES ──────────────────────────────────────────────────────────────

            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:12,color:r.isPlayer?"#ffdd00":"#bbb"}}>{r.name}</div>
              <div style={{fontSize:8,color:r.col}}>{r.team}</div>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:r.isPlayer?"#ffdd00":"#666"}}>{fmtT(r.qualiTime||r.time)}</div>
          </div>
        ))}
      </div>
      <div style={{color:"#444",fontSize:8,marginBottom:12,textAlign:"center"}}>
        {qualiResults.findIndex(r=>r.isPlayer)===0?"🏆 POLE POSITION!":qualiResults.findIndex(r=>r.isPlayer)<3?"🎉 Front row!":
         `P${qualiResults.findIndex(r=>r.isPlayer)+1} — Fight your way through!`}
      </div>
      <button onClick={()=>startRace(qualiResults)} style={bigBtn("#e8002d","#fff")}>🚦 START THE RACE!</button>
      <button onClick={startQuali} style={{...bigBtn("#111","#555"),marginTop:7,border:"1px solid #1a1a1a",boxShadow:"none"}}>🔄 REQUALI</button>
    </div>
  );

  // ── FINISH ───────────────────────────────────────────────────────────────
  if(screen==="finish"){
    const pR=results.findIndex(r=>r.isPlayer);
    const updatedStandings=seasonMode&&seasonStandings?addPoints(seasonStandings,results):null;
    const teamStandings=updatedStandings?getTeamStandings(updatedStandings):null;
    const nextRound=seasonRound+1;
    const seasonDone=seasonMode&&nextRound>=SEASON_ROUNDS;
    return wrap(
      <div style={CENTER}>
        {seasonMode&&<div style={{fontSize:9,color:"#ffdd00",letterSpacing:2,marginBottom:4}}>🏆 ROUND {seasonRound+1}/{SEASON_ROUNDS} — {CIRCUITS[seasonRound%SEASON_ROUNDS].country} {CIRCUITS[seasonRound%SEASON_ROUNDS].name}</div>}
        <div style={{fontSize:42}}>{pR===0?"🏆":pR<3?"🎉":"😤"}</div>
        <h1 style={{...TITLE,color:pR===0?"#ff8800":"white",fontSize:20,lineHeight:1.2}}>
          {pR===0?"WINNER!":pR<3?"GREAT DRIVE!":"RACE DONE!"}
          {pR===0&&" +25 PTS"}{pR===1&&" +18 PTS"}{pR===2&&" +15 PTS"}
        </h1>
        <p style={{color:"#444",fontSize:8,letterSpacing:2,marginBottom:7}}>RACE RESULT</p>
        <div style={{width:290,marginBottom:8,maxHeight:"38vh",overflowY:"auto"}}>
          {results.map((r,i)=>(
            <div key={r.name} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 10px",marginBottom:3,background:r.isPlayer?"#110000":"#060606",border:`1px solid ${r.isPlayer?"#e8002d55":"#0d0d0d"}`,borderLeft:`4px solid ${r.col}`,borderRadius:5}}>
              <span style={{fontSize:10,width:26,color:i<3?"#ffdd00":"#444",fontWeight:i<3?900:400}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`P${i+1}`}</span>
              <span style={{flex:1,fontWeight:r.isPlayer?900:700,fontSize:11,color:r.isPlayer?"#fff":"#bbb"}}>{r.name}</span>
              <span style={{fontSize:8,color:"#ff8800",fontWeight:700,minWidth:24,textAlign:"right"}}>{POINTS_TABLE[i]?`+${POINTS_TABLE[i]}`:""}</span>
              <span style={{fontSize:8,color:r.col,minWidth:60,textAlign:"right"}}>{r.team}</span>
            </div>
          ))}
        </div>
        {updatedStandings&&teamStandings&&<StandingsTabs drivers={updatedStandings} teams={teamStandings} tab={standingsTab} setTab={setStandingsTab}/>}
        {seasonDone?(
          <>
            <div style={{fontSize:24,marginBottom:4}}>🏆</div>
            <div style={{color:"#ffdd00",fontSize:13,fontWeight:900,marginBottom:4}}>SEASON CHAMPION!</div>
            <div style={{color:"#888",fontSize:9,marginBottom:10}}>{updatedStandings?.[0]?.name||"CHAMPION"} wins!</div>
            <button onClick={()=>{setSeasonMode(false);setSeasonRound(0);setSeasonStandings(null);setScreen("menu");}} style={bigBtn("#ffdd00","#111")}>🏠 MENU</button>
          </>
        ):seasonMode?(
          <>
            <button onClick={()=>{setSeasonStandings(updatedStandings);setSeasonRound(r=>r+1);setScreen("seasonNext");}} style={bigBtn("#ffdd00","#111")}>➡️ NEXT: {CIRCUITS[nextRound%SEASON_ROUNDS].country} {CIRCUITS[nextRound%SEASON_ROUNDS].name}</button>
            <button onClick={()=>{setSeasonMode(false);setSeasonRound(0);setSeasonStandings(null);setScreen("menu");}} style={{...bigBtn("#111","#555"),marginTop:7,border:"1px solid #1a1a1a",boxShadow:"none"}}>🏠 QUIT SEASON</button>
          </>
        ):(
          <>
            <button onClick={startQuali} style={bigBtn("#ffdd00","#111")}>🔄 RACE AGAIN</button>
            <button onClick={()=>setScreen("menu")} style={{...bigBtn("#080808","#555"),marginTop:7,border:"1px solid #111",boxShadow:"none"}}>🏠 MENU</button>
          </>
        )}
      </div>
    );
  }

  // ── SEASON NEXT ──────────────────────────────────────────────────────────
  if(screen==="seasonNext"){
    const circ=CIRCUITS[seasonRound%SEASON_ROUNDS];
    return wrap(
      <div style={CENTER}>
        <div style={{fontSize:8,color:"#ffdd00",letterSpacing:2,marginBottom:6}}>🏆 SEASON — ROUND {seasonRound+1}/{SEASON_ROUNDS}</div>
        <div style={{fontSize:36,marginBottom:4}}>{circ.country}</div>
        <h1 style={{...TITLE,fontSize:22}}>{circ.name}</h1>
        <p style={{color:"#444",fontSize:8,letterSpacing:2,marginBottom:12}}>GRAND PRIX</p>
        {seasonStandings&&<StandingsTabs drivers={seasonStandings} teams={getTeamStandings(seasonStandings)} tab={standingsTab} setTab={setStandingsTab}/>}
        <div style={{fontSize:8,color:"#e8002d",letterSpacing:2,marginBottom:7}}>QUALIFYING TIRE</div>
        <div style={{width:280,marginBottom:12}}>
          {["soft","medium","hard"].map(k=>{const t=TIRES[k];return(
            <div key={k} onClick={()=>setStartTire(k)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",marginBottom:4,background:startTire===k?"#181818":"#090909",border:`2px solid ${startTire===k?t.col:"#1a1a1a"}`,borderRadius:10,cursor:"pointer"}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:t.col,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:900,color:t.col}}>{t.name}</span>
              <span style={{fontSize:8,color:"#555",marginLeft:4}}>{t.tag}</span>
              {startTire===k&&<span style={{marginLeft:"auto",fontSize:12}}>✅</span>}
            </div>
          );})}
        </div>
        <button onClick={startSeasonQuali} style={bigBtn("#ffdd00","#111")}>🕐 QUALIFY</button>
      </div>
    );
  }

  // ── RACE ─────────────────────────────────────────────────────────────────
  return wrap(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 10px",background:"rgba(0,0,0,0.6)"}}>
        <div style={{fontSize:14,fontWeight:900,color:hud.pos===1?"#ff8800":"white"}}>{ORDINALS[hud.pos-1]||`P${hud.pos}`}</div>
        <div><span style={{fontSize:12,fontWeight:900}}>LAP {hud.lap}</span><span style={{fontSize:8,color:"#222"}}>/{MAX_LAPS}</span></div>
        <div style={{fontSize:14,fontWeight:900,color:"#e8002d"}}>{hud.speed}<span style={{fontSize:7,color:"#333"}}> KMH</span></div>
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        <canvas ref={cvRef} width={SW} height={SH} style={{display:"block",width:"100%",height:"100%"}}/>
        {pitMenu&&(
          <div style={{position:"absolute",top:"18%",left:"50%",transform:"translateX(-50%)",background:"#080808",border:"1px solid #2a2a2a",borderRadius:13,padding:"12px 14px",width:240,zIndex:20}}>
            <div style={{fontSize:9,color:"#ff8800",letterSpacing:2,marginBottom:10,textAlign:"center"}}>🔧 SELECT NEW TIRES</div>
            {Object.entries(TIRES).filter(([k])=>k!==hud.tire).map(([k,t])=>(
              <div key={k} onClick={()=>confirmPit(k)} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",marginBottom:5,borderRadius:8,border:`1px solid ${t.col}44`,background:`${t.col}12`,cursor:"pointer"}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:t.col,flexShrink:0}}/>
                <div><div style={{fontSize:11,fontWeight:700,color:t.col}}>{t.name}</div><div style={{fontSize:7,color:"#555"}}>{t.tag}</div></div>
              </div>
            ))}
            <div onClick={()=>setPitMenu(false)} style={{textAlign:"center",color:"#2a2a2a",fontSize:8,cursor:"pointer",marginTop:5}}>✕ CANCEL</div>
          </div>
        )}
      </div>
      <div style={{padding:"2px 12px"}}>
        <div style={{height:3,background:"#0d0d0d",borderRadius:2}}><div style={{height:3,width:`${hud.speed/KMH*100}%`,background:"linear-gradient(90deg,#ff8800,#e8002d)",borderRadius:2,transition:"width 0.06s"}}/></div>
      </div>
      <div style={{display:"flex",gap:7,padding:"3px 0 4px",alignItems:"center",justifyContent:"center"}}>
        <button onPointerDown={()=>btnRef.current.left=true} onPointerUp={()=>btnRef.current.left=false} onPointerLeave={()=>btnRef.current.left=false} style={ctrl("#e8002d","56px","50px")}>◀</button>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <button onPointerDown={()=>btnRef.current.gas=true} onPointerUp={()=>btnRef.current.gas=false} onPointerLeave={()=>btnRef.current.gas=false} style={ctrl("#1a9933","62px","34px")}>⛽ GAS</button>
          <button onPointerDown={()=>btnRef.current.brake=true} onPointerUp={()=>btnRef.current.brake=false} onPointerLeave={()=>btnRef.current.brake=false} style={ctrl("#991122","62px","30px")}>🛑 BRK</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <button onPointerDown={()=>btnRef.current.ers=true} onPointerUp={()=>btnRef.current.ers=false} onPointerLeave={()=>btnRef.current.ers=false} style={{...ctrl("#8833cc","50px","34px"),fontWeight:900,fontSize:9,background:hud.ersD?"#200055":"#0a0012",border:`2px solid ${hud.ersD?"#cc44ff":"#2a0a44"}`,color:hud.ersD?"#cc44ff":"#441166",boxShadow:hud.ersD?"0 0 10px #cc44ff77":"none"}}>⚡ERS</button>
          <button onPointerDown={()=>btnRef.current.drs=true} onPointerUp={()=>btnRef.current.drs=false} onPointerLeave={()=>btnRef.current.drs=false} style={{...ctrl("#00cc44","50px","28px"),fontWeight:900,fontSize:9,background:hud.drsO?"#002a11":"#060606",border:`2px solid ${hud.drsA?"#00cc44":"#0a1a0a"}`,color:hud.drsA?"#00cc44":"#0a2a0a"}}>DRS</button>
        </div>
        <button onClick={()=>{if(hud.pitPhase==="none"&&hud.lap>=2&&!hud.pitReq)setPitMenu(v=>!v);}}
          style={{width:46,height:50,fontSize:8,fontWeight:900,lineHeight:1.4,background:hud.pitReq?"#2a1600":hud.wet>40?"#00102a":"#080808",border:`2px solid ${hud.pitReq?"#ff8800":hud.wet>40?"#4488ff":hud.dmg>35?"#ff3300":"#1e1e1e"}`,borderRadius:10,color:hud.pitReq?"#ff8800":hud.wet>40?"#4488ff":"#383838",cursor:"pointer",fontFamily:"'Courier New',monospace"}}>
          🔧<br/>{hud.pitReq?"BOX":"PIT"}
        </button>
        <button onPointerDown={()=>btnRef.current.right=true} onPointerUp={()=>btnRef.current.right=false} onPointerLeave={()=>btnRef.current.right=false} style={ctrl("#e8002d","56px","50px")}>▶</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<F1Sim />);
</script>
</body>
</html>
